version: '3.8'

services:
  mysql:
    image: mysql:9.7
    container_name: hrss-mysql-prod
    restart: always
    environment:
      MYSQL_DATABASE: hrss_db
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-prod_secret_password}
    volumes:
      - mysql-prod-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-prod_secret_password}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: hrss-redis-prod
    restart: always
    volumes:
      - redis-prod-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: hrss-app-prod
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/hrss_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD:-prod_secret_password}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_PROFILES_ACTIVE=prod
      - JWT_SECRET=${JWT_SECRET:-your_super_secret_jwt_key_for_production}
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID:-your_azure_client_id}
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET:-your_azure_client_secret}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
    volumes:
      - app-logs:/app/logs

  nginx:
    image: nginx:latest
    container_name: hrss-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      app:
        condition: service_healthy

  loki:
    image: grafana/loki:latest
    container_name: hrss-loki
    restart: always

  promtail:
    image: grafana/promtail:latest
    container_name: hrss-promtail
    restart: always
    volumes:
      - app-logs:/var/log/app
      - ./promtail/config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:latest
    container_name: hrss-grafana
    restart: always
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-super_secure_admin_password}
    depends_on:
      - loki

volumes:
  mysql-prod-data:
  redis-prod-data:
  app-logs:
