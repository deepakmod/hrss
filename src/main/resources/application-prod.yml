spring:
  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000
  jpa:
    show-sql: false

logging:
  level:
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    com.mod.hrss: INFO

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

app:
  cors:
    allowed-origins: ${CORS_ORIGINS:https://your-frontend-domain.com}
